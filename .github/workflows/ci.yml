# .github/workflows/ci.yml
name: CI

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      run_rdma_tests:
        description: Run RDMA/CUDA tests on the self-hosted runner
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pre-commit
        run: python -m pip install pre-commit

      - name: Run pre-commit
        run: pre-commit run --all-files

  build-wheel:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            libnuma-dev \
            libibverbs-dev

      - name: Install build dependencies
        run: |
          python -m pip install -U pip build wheel
          python -m pip install scikit-build-core pybind11 ninja

      - name: Build wheel
        env:
          CMAKE_ARGS: >-
            -DBUILD_RDMA=ON
            -DBUILD_PYTHON=ON
            -DBUILD_NVLINK=OFF
            -DBUILD_TORCH_PLUGIN=OFF
            -DBUILD_ASCEND_DIRECT=OFF
            -DBUILD_TEST=OFF
        run: python -m build --wheel

      - name: Install wheel smoke test
        run: |
          python -m pip install dist/*.whl --no-deps
          cd /tmp
          python - <<'PY'
          import dlslime
          print("dlslime import ok")
          PY

  rdma-tests:
    name: RDMA tests
    if: >
      (github.event_name == 'workflow_dispatch' &&
       inputs.run_rdma_tests == 'true') ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: [self-hosted, linux, rdma]
    environment: self-hosted-rdma
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Show runner devices
        run: |
          hostname
          nvidia-smi || true
          ibv_devinfo || true

      - name: Install test dependencies
        run: |
          python -m pip install -U pip pytest
          python -m pip install -e .

      - name: Run RDMA Python tests
        run: pytest tests/python -v
